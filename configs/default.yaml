languages:
  - en
  - ru

sample_size: 10000

heuristics:
  thresholds:
    char_count_min: 200
    char_count_max: 100000
    word_count_min: 30
    mean_word_length_min: 3.0
    mean_word_length_max: 12.0
    punct_ratio_max: 0.15
    digit_ratio_max: 0.2
    uppercase_ratio_max: 0.2
    stop_word_ratio_min: 0.35   # English-calibrated — intentionally biased
    mean_line_length_min: 20
    bullet_ratio_max: 0.5

dedup:
  num_perm: 128
  threshold: 0.7
  ngram_size: 5

judge:
  model: meta-llama/llama-3.1-8b-instruct
  fallback_model: mistralai/mistral-small
  confidence_threshold: 0.5
  max_tokens_input: 400
  max_retries: 3

sampling:
  judge_sample_size: 300
  per_quadrant: 75
